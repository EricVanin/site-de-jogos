name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm check

  deploy-coolify:
    name: Deploy Coolify
    needs: checks
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_RESOURCE_UUID: ${{ secrets.COOLIFY_RESOURCE_UUID }}
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
        run: |
          if [ -z "$COOLIFY_API_TOKEN" ] || [ -z "$COOLIFY_RESOURCE_UUID" ] || [ -z "$COOLIFY_URL" ]; then
            echo "Coolify deployment secrets are not fully configured. Skipping deploy."
            exit 0
          fi

          curl --fail --silent --show-error \
            --request GET \
            --header "Authorization: Bearer $COOLIFY_API_TOKEN" \
            "$COOLIFY_URL/api/v1/deploy?uuid=$COOLIFY_RESOURCE_UUID&force=true"
