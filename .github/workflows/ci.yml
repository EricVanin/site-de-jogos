name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm check

  deploy-coolify:
    name: Deploy Coolify
    needs: checks
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        env:
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$COOLIFY_DEPLOY_WEBHOOK" ]; then
            echo "COOLIFY_DEPLOY_WEBHOOK is not configured. Skipping deploy."
            exit 0
          fi

          curl --fail --silent --show-error --request POST "$COOLIFY_DEPLOY_WEBHOOK"
